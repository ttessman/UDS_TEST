apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-poc
  namespace: catalog-poc
  labels:
    app.kubernetes.io/name: catalog-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog-poc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog-poc
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: catalog-poc
          image: localhost:5001/catalog-poc:0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: CATALOG_POC_VERSION
              value: "0.1.0"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-poc
  namespace: catalog-poc
  labels:
    app.kubernetes.io/name: catalog-poc
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: catalog-poc
  ports:
    - name: http
      port: 8080
      targetPort: http
